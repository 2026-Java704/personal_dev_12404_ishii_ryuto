<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<header th:replace="~{header}"></header>
	
<h1>服薬一覧</h1>

<table border="1">
	<tr>
		<th>NO</th>
		<th>お薬名</th>
		<th>個数</th>
		<th>飲んだかどうか</th>
		<th>備考</th>
		<th>更新</th>
		<th>削除</th>
	</tr>
	<tr th:each="medicine:${medicineList}">
					<td th:text="${medicine.id}"></td>
					<td th:text="${medicine.name}"></td>
					<td th:text="${medicine.count}"></td>
					<td>
					<input type="checkbox" name="mCheck" value="true" th:checked="${medicine.mCheck == true}"> 済
					<input type="checkbox" name="mCheck" value="false" th:checked="${medicine.mCheck == false}"> 未済
					</td>
					
					<td th:text="${medicine.note}"></td>
					
					<form th:action="'/medicine/'+${medicine.id}+'/edit'" method="get">
					<td><button>更新</button></td>
					</form>
					
					<form th:action="'/medicine/'+${medicine.id}+'/delete'" method="post">
										<td><button>削除</button></td>
										</form>
</table>
<form action ="/medicine/add" method="get">
	<button>新規追加</button>
</form>
</body>
</html>
